name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Provide dummy values for build-time env vars
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_LIFF_ID: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          LINE_CHANNEL_SECRET: placeholder
          LINE_CHANNEL_ACCESS_TOKEN: placeholder
          LINE_LOGIN_CHANNEL_ID: placeholder
          ADMIN_PASSWORD: placeholder
          SENTRY_AUTH_TOKEN: placeholder

      - name: Lint
        run: npm run lint
